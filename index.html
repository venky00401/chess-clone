<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play & Analyze Chess</title>
    <!-- Chessboard.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #312e2b;
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
        }
        .board-container {
            flex: 1;
            min-width: 300px;
            max-width: 500px;
        }
        .panel {
            flex: 1;
            min-width: 300px;
            background: #262421;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-height: 500px;
        }
        h2 { margin-top: 0; font-size: 1.4em; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        /* Buttons */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        button {
            flex: 1;
            background: #81b64c;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #69983b; }
        button.secondary { background: #454341; }
        button.secondary:hover { background: #555351; }
        button:disabled { background: #444; color: #777; cursor: not-allowed; }

        /* Analysis Stats */
        #accuracy-display {
            background: #1e1c1a;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
        }
        .w-acc { color: #fff; font-weight: bold; }
        .b-acc { color: #000; background: #fff; padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        
        #moves-list {
            flex-grow: 1;
            overflow-y: auto;
            background: #1e1c1a;
            border-radius: 6px;
            padding: 10px;
        }
        .move-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #333;
        }
        .move-row:last-child { border-bottom: none; }
        
        /* Move Grade Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8em; color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,0.3);}
        .Best { background: #81b64c; }
        .Excellent { background: #96bc4b; }
        .Good { background: #aebc4b; }
        .Inaccuracy { background: #f0c15c; color: #333; text-shadow: none;}
        .Mistake { background: #e6912c; }
        .Blunder { background: #b33430; }

        #status-bar { text-align: center; margin-top: 15px; font-size: 0.9em; color: #aaa; min-height: 20px;}
    </style>
</head>
<body>

<div class="container">
    <!-- Chess Board -->
    <div class="board-container">
        <div id="board"></div>
    </div>

    <!-- Interface Panel -->
    <div class="panel">
        <h2>Play & Analyze</h2>
        
        <div class="controls">
            <button onclick="resetGame()">New Game</button>
            <button id="analyze-btn" class="secondary" onclick="startAnalysis()" disabled>Analyze Game</button>
        </div>

        <div id="accuracy-display" style="display: none;">
            <span class="w-acc">White: --%</span>
            <span class="b-acc">Black: --%</span>
        </div>
        
        <div id="moves-list">
            <div style="color: #aaa; text-align: center; margin-top: 40px; line-height: 1.5;">
                You play as <strong>White</strong>.<br>
                Make a move to start playing against Stockfish.<br><br>
                When finished, click <strong>Analyze Game</strong>.
            </div>
        </div>

        <div id="status-bar">Loading Engine...</div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script>
    // --- 1. Global Variables & Setup ---
    let game = new Chess();
    let board = null;
    let positions = [game.fen()]; 
    let movesData = []; 
    
    let sfWorker;
    let engineReady = false;
    let isAnalyzing = false;
    let isBotThinking = false;
    
    // For Analysis
    let evalIndex = 0;
    let evaluations = []; 
    let currentCP = 0;

    // --- 2. Initialize Stockfish ---
    fetch('https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js')
        .then(res => res.text())
        .then(text => {
            const blob = new Blob([text], { type: 'application/javascript' });
            sfWorker = new Worker(URL.createObjectURL(blob));
            engineReady = true;
            document.getElementById('status-bar').innerText = "Engine Ready. Your move!";
            
            sfWorker.onmessage = function(event) {
                handleEngineMessage(event.data);
            };
        });

    // --- 3. Board Gameplay Logic ---
    function onDragStart(source, piece, position, orientation) {
        // Do not pick up pieces if the game is over, analyzing, or it's the bot's turn
        if (game.game_over() || isAnalyzing || isBotThinking) return false;
        // Only allow White pieces to be dragged (User is white)
        if (piece.search(/^b/) !== -1) return false;
    }

    function onDrop(source, target) {
        // See if the move is legal
        let move = game.move({ from: source, to: target, promotion: 'q' });
        
        if (move === null) return 'snapback'; // Illegal move

        // Legal move by player
        recordMove(move);
        updateStatus();
        document.getElementById('analyze-btn').disabled = false;

        // Trigger bot move
        if (!game.game_over()) {
            isBotThinking = true;
            document.getElementById('status-bar').innerText = "Stockfish is thinking...";
            // Ask Stockfish for a move (Depth 10 for quick play)
            sfWorker.postMessage('position fen ' + game.fen());
            sfWorker.postMessage('go depth 10');
        }
    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    function recordMove(move) {
        positions.push(game.fen());
        movesData.push({ san: move.san, color: move.color });
        
        // Populate move list simply during play
        let list = document.getElementById('moves-list');
        if (!isAnalyzing && movesData.length === 1) list.innerHTML = ""; // Clear instructions
        
        if (!isAnalyzing) {
            let moveNum = Math.ceil(movesData.length / 2);
            let prefix = move.color === 'b' ? '... ' : '';
            list.innerHTML += `<div class="move-row"><span>${moveNum}. ${prefix}${move.san}</span></div>`;
            list.scrollTop = list.scrollHeight;
        }
    }

    board = Chessboard('board', {
        draggable: true,
        position: 'start',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd
    });

    function resetGame() {
        game.reset();
        board.start();
        positions = [game.fen()];
        movesData = [];
        isAnalyzing = false;
        isBotThinking = false;
        document.getElementById('analyze-btn').disabled = true;
        document.getElementById('accuracy-display').style.display = 'none';
        document.getElementById('moves-list').innerHTML = `
            <div style="color: #aaa; text-align: center; margin-top: 40px; line-height: 1.5;">
                You play as <strong>White</strong>.<br>
                Make a move to start playing against Stockfish.<br><br>
                When finished, click <strong>Analyze Game</strong>.
            </div>`;
        updateStatus();
    }

    function updateStatus() {
        let statusEl = document.getElementById('status-bar');
        if (game.in_checkmate()) statusEl.innerText = "Game over, checkmate.";
        else if (game.in_draw()) statusEl.innerText = "Game over, drawn.";
        else statusEl.innerText = game.turn() === 'w' ? "Your turn (White)" : "Bot's turn (Black)";
    }

    // --- 4. Engine Message Handler ---
    function handleEngineMessage(line) {
        // --- PLAY MODE ---
        if (!isAnalyzing) {
            if (line.includes('bestmove')) {
                let match = line.match(/^bestmove\s([a-h][1-8][a-h][1-8][qrbn]?)/);
                if (match) {
                    let bestMove = match[1];
                    // Convert engine move format (e.g. e7e5) to chess.js format
                    let moveObj = { from: bestMove.substring(0, 2), to: bestMove.substring(2, 4) };
                    if (bestMove.length === 5) moveObj.promotion = bestMove.substring(4, 5);
                    
                    let move = game.move(moveObj);
                    board.position(game.fen());
                    recordMove(move);
                    
                    isBotThinking = false;
                    updateStatus();
                }
            }
        } 
        // --- ANALYSIS MODE ---
        else {
            if (line.includes('info depth') && line.includes('score cp')) {
                const match = line.match(/score cp (-?\d+)/);
                if (match) currentCP = parseInt(match[1], 10);
            } else if (line.includes('info depth') && line.includes('score mate')) {
                const match = line.match(/score mate (-?\d+)/);
                if (match) {
                    const mateIn = parseInt(match[1], 10);
                    currentCP = mateIn > 0 ? 10000 - mateIn : -10000 - mateIn;
                }
            }
            
            if (line.includes('bestmove')) {
                const isWhiteToMove = positions[evalIndex].includes(' w ');
                const whiteCP = isWhiteToMove ? currentCP : -currentCP;
                evaluations.push(whiteCP);
                
                evalIndex++;
                analyzeNext();
            }
        }
    }

    // --- 5. Analysis Logic ---
    function startAnalysis() {
        if (!engineReady || positions.length < 2) return;
        
        isAnalyzing = true;
        document.getElementById('analyze-btn').disabled = true;
        document.getElementById('moves-list').innerHTML = ""; // Clear for graded list
        evalIndex = 0;
        evaluations = [];
        analyzeNext();
    }

    function analyzeNext() {
        if (evalIndex >= positions.length) {
            generateReport();
            return;
        }
        document.getElementById('status-bar').innerText = `Analyzing move ${evalIndex} of ${positions.length - 1}...`;
        
        currentCP = 0;
        sfWorker.postMessage('position fen ' + positions[evalIndex]);
        sfWorker.postMessage('go depth 12'); // Depth 12 for fast browser analysis
    }

    function getWinProb(cp) {
        return 50 + 50 * (2 / (1 + Math.exp(-0.00368208 * cp)) - 1);
    }

    function generateReport() {
        document.getElementById('status-bar').innerText = "Analysis Complete!";
        document.getElementById('accuracy-display').style.display = 'flex';
        
        let html = "";
        let whiteAccSum = 0, blackAccSum = 0, wMoves = 0, bMoves = 0;

        for (let i = 1; i < positions.length; i++) {
            const prevWinProb = getWinProb(evaluations[i-1]);
            const currWinProb = getWinProb(evaluations[i]);
            const color = movesData[i-1].color;
            const san = movesData[i-1].san;
            
            let loss = color === 'w' ? (prevWinProb - currWinProb) : (currWinProb - prevWinProb);
            loss = Math.max(0, loss); 

            let grade = "Best";
            if (loss <= 2) grade = "Excellent";
            else if (loss <= 5) grade = "Good";
            else if (loss <= 10) grade = "Inaccuracy";
            else if (loss <= 20) grade = "Mistake";
            else grade = "Blunder";

            let moveAccuracy = Math.max(0, 100 - (loss * 5));
            if (color === 'w') { whiteAccSum += moveAccuracy; wMoves++; }
            else { blackAccSum += moveAccuracy; bMoves++; }

            const moveNumber = Math.ceil(i / 2);
            const prefix = color === 'b' ? '... ' : '';
            html += `
                <div class="move-row">
                    <span>${moveNumber}. ${prefix}${san}</span>
                    <span class="badge ${grade}">${grade}</span>
                </div>
            `;
        }

        const wAcc = wMoves > 0 ? (whiteAccSum / wMoves).toFixed(1) : 100;
        const bAcc = bMoves > 0 ? (blackAccSum / bMoves).toFixed(1) : 100;

        document.querySelector('.w-acc').innerText = `White: ${wAcc}%`;
        document.querySelector('.b-acc').innerText = `Black: ${bAcc}%`;
        document.getElementById('moves-list').innerHTML = html;
    }
</script>

</body>
</html>
